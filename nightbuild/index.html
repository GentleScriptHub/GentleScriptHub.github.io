<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train With Me</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;margin:0}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#111827;padding:20px;border-radius:15px;width:90%;max-width:400px}
input,button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px}
input{background:#1f2937;color:white}
button{background:#22c55e;color:black;font-weight:bold}
.section{background:#111827;padding:15px;margin:15px;border-radius:15px}
.chat{max-height:200px;overflow:auto}
.msg{padding:8px;margin:5px;border-radius:10px}
.me{background:#22c55e;color:black;text-align:right}
.them{background:#1f2937}
</style>
</head>

<body>

<div id="login" class="center">
  <div class="card">
    <h2>Enter Your Name</h2>
    <input id="name">
    <button onclick="start()">Continue</button>
  </div>
</div>

<div id="app" style="display:none">

<div class="section">
<h2>Book Session</h2>
<form action="https://formsubmit.co/javonjoseph2004@gmail.com" method="POST" target="_blank">
<input id="bookName" name="name">
<input name="email" placeholder="Email">
<input type="date" name="date">
<input type="time" name="time">
<button>Book</button>
</form>
</div>

<div class="section">
<h2>Chat Trainer 💬</h2>
<div id="chat" class="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

<script>
let user;

function start(){
user=document.getElementById('name').value;
if(!user) return;
localStorage.setItem('user',user);
document.getElementById('login').style.display='none';
document.getElementById('app').style.display='block';
document.getElementById('bookName').value=user;
load();
}

function key(){return 'chat_'+user}

function send(){
let msg=document.getElementById('msg');
if(!msg.value) return;
let data=JSON.parse(localStorage.getItem(key())||'[]');
data.push({from:'client',text:msg.value});
localStorage.setItem(key(),JSON.stringify(data));
msg.value='';
load();
}

function load(){
let box=document.getElementById('chat');
box.innerHTML='';
let data=JSON.parse(localStorage.getItem(key())||'[]');
data.forEach(m=>{
let d=document.createElement('div');
d.className='msg '+(m.from==='client'?'me':'them');
d.innerText=m.text;
box.appendChild(d);
});
}

if(localStorage.getItem('user')){
user=localStorage.getItem('user');
start();
}
</script>

</body>
</html>
