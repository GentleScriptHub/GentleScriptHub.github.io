<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Dashboard</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0f172a;
  color:white;
}

header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #1f2937;
}

.container{
  display:grid;
  grid-template-columns: 1fr;
  gap:20px;
  padding:20px;
}

.section{
  background:#111827;
  padding:15px;
  border-radius:15px;
}

.users div{
  padding:10px;
  margin:5px 0;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
}

.users div:hover{
  background:#374151;
}

.chat-box{
  max-height:250px;
  overflow-y:auto;
  margin-bottom:10px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
}

.me{
  background:#22c55e;
  color:black;
  text-align:right;
}

.them{
  background:#1f2937;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#22c55e;
  color:black;
  font-weight:bold;
}

/* DESKTOP */
@media(min-width:900px){
  .container{
    grid-template-columns: 1fr 2fr 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>💪 Trainer Dashboard</h1>
</header>

<div class="container">

<!-- CLIENT LIST -->
<div class="section">
  <h2>👥 Clients</h2>
  <div id="users" class="users"></div>
</div>

<!-- CHAT -->
<div class="section">
  <h2>💬 Chat</h2>
  <div id="chatBox" class="chat-box"></div>
  <input id="reply" placeholder="Reply...">
  <button onclick="send()">Send</button>
</div>

<!-- BOOKINGS -->
<div class="section">
  <h2>📅 Appointments</h2>
  <div id="appointments"></div>
</div>

</div>

<script>
let currentUser = null;

// LOAD USERS
function loadUsers(){
  let list=document.getElementById('users');
  list.innerHTML='';

  for(let key in localStorage){
    if(key.startsWith('chat_')){
      let name=key.replace('chat_','');

      let div=document.createElement('div');
      div.innerText=name;

      div.onclick=()=>{
        currentUser=name;
        loadChat();
      };

      list.appendChild(div);
    }
  }
}

// LOAD CHAT
function loadChat(){
  let box=document.getElementById('chatBox');
  box.innerHTML='';

  let chat=JSON.parse(localStorage.getItem('chat_'+currentUser)||'[]');

  chat.forEach(m=>{
    let div=document.createElement('div');
    div.className='msg '+(m.from==='trainer'?'me':'them');
    div.innerText=m.text;
    box.appendChild(div);
  });
}

// SEND MESSAGE
function send(){
  let input=document.getElementById('reply');

  if(!input.value || !currentUser){
    alert('Select a client');
    return;
  }

  let chat=JSON.parse(localStorage.getItem('chat_'+currentUser)||'[]');

  chat.push({
    from:'trainer',
    text:input.value
  });

  localStorage.setItem('chat_'+currentUser,JSON.stringify(chat));

  input.value='';
  loadChat();
}

// LOAD BOOKINGS (SIMULATED)
function loadAppointments(){
  let box=document.getElementById('appointments');
  box.innerHTML='';

  let bookings=JSON.parse(localStorage.getItem('appointments')||'[]');

  bookings.forEach(b=>{
    let div=document.createElement('div');
    div.style.background='#1f2937';
    div.style.padding='10px';
    div.style.marginTop='10px';
    div.style.borderRadius='10px';

    div.innerHTML=`
      <strong>${b.name}</strong><br>
      ${b.date} at ${b.time}<br>
      ${b.email}
    `;

    box.appendChild(div);
  });
}

// INIT
loadUsers();
loadAppointments();
</script>

</body>
</html>
