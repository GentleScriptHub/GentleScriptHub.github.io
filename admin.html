<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Dashboard</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;margin:0}
.container{display:flex;flex-wrap:wrap}
.users{width:25%;padding:10px}
.chat{width:40%;padding:10px}
.appointments{width:35%;padding:10px}

.user{padding:10px;background:#1f2937;margin:5px;border-radius:10px;cursor:pointer}
.user:hover{background:#374151}

.msg{margin:5px;padding:8px;border-radius:10px}
.me{background:#22c55e;color:black;text-align:right}
.them{background:#1f2937}

.card{background:#1f2937;padding:10px;margin-top:10px;border-radius:10px}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{background:#22c55e;color:black;font-weight:bold}

@media(max-width:900px){
  .users,.chat,.appointments{width:100%}
}
</style>
</head>

<body>

<h2 style="text-align:center;">💪 Trainer Dashboard</h2>

<div class="container">

<!-- USERS -->
<div class="users">
  <h3>Clients</h3>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div class="chat">
  <h3>Chat</h3>
  <div id="chatBox"></div>
  <input id="reply" placeholder="Reply...">
  <button onclick="sendChat()">Send</button>
</div>

<!-- APPOINTMENTS -->
<div class="appointments">
  <h3>Appointments</h3>
  <div id="appointments"></div>
</div>

</div>

<script>
let currentUser = null;

// LOAD USERS
function loadUsers(){
  let list = document.getElementById('users');
  list.innerHTML = '';

  for(let key in localStorage){
    if(key.startsWith('chat_')){
      let name = key.replace('chat_','');

      let div = document.createElement('div');
      div.className = 'user';
      div.innerText = name;

      div.onclick = () => {
        currentUser = name;
        loadChat();
      };

      list.appendChild(div);
    }
  }
}

// LOAD CHAT
function loadChat(){
  let box = document.getElementById('chatBox');
  box.innerHTML = '';

  let chat = JSON.parse(localStorage.getItem('chat_'+currentUser)||'[]');

  chat.forEach(m=>{
    let div = document.createElement('div');
    div.className = 'msg ' + (m.from === 'trainer' ? 'me' : 'them');
    div.innerText = m.text;
    box.appendChild(div);
  });
}

// SEND CHAT
function sendChat(){
  let input = document.getElementById('reply');

  if(!input.value || !currentUser){
    alert('Select a client');
    return;
  }

  let chat = JSON.parse(localStorage.getItem('chat_'+currentUser)||'[]');

  chat.push({
    from:'trainer',
    text:input.value
  });

  localStorage.setItem('chat_'+currentUser, JSON.stringify(chat));

  input.value = '';
  loadChat();
}

// LOAD APPOINTMENTS
function loadAppointments(){
  let box = document.getElementById('appointments');
  box.innerHTML = '';

  let bookings = JSON.parse(localStorage.getItem('appointments') || '[]');

  bookings.forEach((b, index)=>{
    let div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <strong>${b.name}</strong><br>
      📅 ${b.date} at ${b.time}<br>
      📧 ${b.email}
      <input id="reply_${index}" placeholder="Reply to this client">
      <button onclick="replyToBooking(${index}, '${b.name}')">Reply</button>
    `;

    box.appendChild(div);
  });
}

// REPLY TO BOOKING → SENDS TO CHAT
function replyToBooking(index, name){
  let input = document.getElementById('reply_'+index);

  if(!input.value) return;

  let chat = JSON.parse(localStorage.getItem('chat_'+name)||'[]');

  chat.push({
    from:'trainer',
    text:input.value
  });

  localStorage.setItem('chat_'+name, JSON.stringify(chat));

  alert("Reply sent to " + name);

  input.value = '';
}

// INIT
loadUsers();
loadAppointments();
</script>

</body>
</html>
