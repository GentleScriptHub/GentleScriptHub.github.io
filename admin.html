<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins;background:#0f172a;color:#e5e7eb}

header{padding:20px;text-align:center;border-bottom:1px solid #1f2937}
header h1{font-size:2rem}

.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:1fr;gap:20px}

.section{background:#111827;padding:20px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,0.3)}
.section h2{margin-bottom:10px}

.users div{padding:10px;background:#1f2937;margin:5px 0;border-radius:10px;cursor:pointer}
.users div:hover{background:#374151}

.chat{max-height:300px;overflow:auto;background:#0b1220;padding:10px;border-radius:12px}
.msg{padding:10px;margin:6px;border-radius:12px}
.me{background:#22c55e;color:black;text-align:right}
.them{background:#1f2937}

.card{background:#1f2937;padding:10px;margin-top:10px;border-radius:12px}

input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:10px}
button{background:#22c55e;color:black;font-weight:bold}

@media(min-width:900px){
.grid{grid-template-columns:1fr 2fr 1fr}
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiCVRf6_qtx8VAPPeXg_9n3alQ-nUv14I",
  authDomain: "nightbuild.firebaseapp.com",
  projectId: "nightbuild",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser=null;

// USERS
function loadUsers(){
  onSnapshot(collection(db,"messages"),snapshot=>{
    let users=new Set();
    snapshot.forEach(doc=>users.add(doc.data().name));

    let box=document.getElementById('users');
    box.innerHTML='';

    users.forEach(name=>{
      let div=document.createElement('div');
      div.innerText=name;
      div.onclick=()=>{currentUser=name;loadChat();};
      box.appendChild(div);
    });
  });
}

// CHAT
function loadChat(){
  const q=query(collection(db,"messages"),orderBy("time"));

  onSnapshot(q,snapshot=>{
    let box=document.getElementById('chatBox');
    box.innerHTML='';

    snapshot.forEach(doc=>{
      let m=doc.data();

      if(
  (m.name === currentUser && m.to === "trainer") ||
  (m.name === "trainer" && m.to === currentUser)
){
        let div=document.createElement('div');
        div.className='msg '+(m.name==="trainer"?'me':'them');
        div.innerText=m.name+": "+m.text;
        box.appendChild(div);
      }
    });
  });
}

// SEND CHAT
window.sendReply=async function(){
  let input=document.getElementById('reply');
  if(!input.value || !currentUser) return;

await addDoc(collection(db,"messages"),{
  name:"trainer",
  text:input.value,
  time:Date.now()
});

  input.value='';
}

// BOOKINGS WITH REPLY
function loadAppointments(){
  onSnapshot(collection(db,"appointments"),snapshot=>{
    let box=document.getElementById('appointments');
    box.innerHTML='';

    snapshot.forEach((doc,i)=>{
      let b=doc.data();

      let div=document.createElement('div');
      div.className='card';

      div.innerHTML=`
        <strong>${b.name}</strong><br>
        📅 ${b.date} at ${b.time}<br>
        📧 ${b.email}
        <input id="reply_${i}" placeholder="Reply to booking">
        <button onclick="replyBooking('${b.name}', ${i})">Send Reply</button>
      `;

      box.appendChild(div);
    });
  });
}

// REPLY TO BOOKING
window.replyBooking=async function(name,i){
  let input=document.getElementById('reply_'+i);
  if(!input.value) return;

 await addDoc(collection(db,"messages"),{
  name:"trainer",
  to:name,
  text:"(Booking Reply) " + input.value,
  time:Date.now()
});

  alert("Reply sent to "+name);
  input.value='';
}

// COMMENTS
function loadComments(){
  onSnapshot(collection(db,"comments"),snapshot=>{
    let box=document.getElementById('comments');
    box.innerHTML='';

    snapshot.forEach(doc=>{
      let c=doc.data();
      let div=document.createElement('div');
      div.className='card';
      div.innerHTML=`<strong>${c.name}</strong><br>${'⭐'.repeat(c.stars)}<br>${c.text}`;
      box.appendChild(div);
    });
  });
}

loadUsers();
loadAppointments();
loadComments();
</script>
</head>

<body>

<header>
  <h1>💪 Trainer Dashboard</h1>
</header>

<div class="container">
  <div class="grid">

    <div class="section">
      <h2>👥 Clients</h2>
      <div id="users" class="users"></div>
    </div>

    <div class="section">
      <h2>💬 Chat</h2>
      <div id="chatBox" class="chat"></div>
      <input id="reply" placeholder="Reply...">
      <button onclick="sendReply()">Send</button>
    </div>

    <div class="section">
      <h2>📅 Appointments</h2>
      <div id="appointments"></div>
    </div>

    <div class="section">
      <h2>⭐ Reviews</h2>
      <div id="comments"></div>
    </div>

  </div>
</div>

</body>
</html>
