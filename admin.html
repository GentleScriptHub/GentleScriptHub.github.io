<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Dashboard</title>

<style>
body{font-family:Poppins;background:#0f172a;color:white;margin:0}

header{
  text-align:center;
  padding:20px;
  border-bottom:1px solid #1f2937;
}

.container{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
  padding:20px;
}

.section{
  background:#111827;
  padding:15px;
  border-radius:15px;
}

.users div{
  padding:10px;
  background:#1f2937;
  margin:5px 0;
  border-radius:10px;
  cursor:pointer;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
}

.me{background:#22c55e;color:black;text-align:right}
.them{background:#1f2937}

.chat{max-height:250px;overflow:auto}

.card{
  background:#1f2937;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{background:#22c55e;color:black;font-weight:bold}

@media(min-width:900px){
  .container{grid-template-columns:1fr 2fr 1fr}
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiCVRf6_qtx8VAPPeXg_9n3alQ-nUv14I",
  authDomain: "nightbuild.firebaseapp.com",
  projectId: "nightbuild",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser=null;

// LOAD USERS
function loadUsers(){
  onSnapshot(collection(db,"messages"),snapshot=>{
    let users=new Set();
    snapshot.forEach(doc=>{
      users.add(doc.data().name);
    });

    let box=document.getElementById('users');
    box.innerHTML='';

    users.forEach(name=>{
      let div=document.createElement('div');
      div.innerText=name;
      div.onclick=()=>{currentUser=name;loadChat();};
      box.appendChild(div);
    });
  });
}

// LOAD CHAT
function loadChat(){
  const q=query(collection(db,"messages"),orderBy("time"));

  onSnapshot(q,snapshot=>{
    let box=document.getElementById('chatBox');
    box.innerHTML='';

    snapshot.forEach(doc=>{
      let m=doc.data();

      if(m.name===currentUser || m.name==="trainer"){
        let div=document.createElement('div');
        div.className='msg '+(m.name==="trainer"?'me':'them');
        div.innerText=m.name+": "+m.text;
        box.appendChild(div);
      }
    });
  });
}

// SEND REPLY
window.sendReply=async function(){
  let input=document.getElementById('reply');
  if(!input.value || !currentUser) return;

  await addDoc(collection(db,"messages"),{
    name:"trainer",
    text:input.value,
    time:Date.now()
  });

  input.value='';
}

// LOAD BOOKINGS
function loadAppointments(){
  onSnapshot(collection(db,"appointments"),snapshot=>{
    let box=document.getElementById('appointments');
    box.innerHTML='';

    snapshot.forEach(doc=>{
      let b=doc.data();

      let div=document.createElement('div');
      div.className='card';

      div.innerHTML=`
        <strong>${b.name}</strong><br>
        📅 ${b.date} at ${b.time}<br>
        📧 ${b.email}
      `;

      box.appendChild(div);
    });
  });
}

// LOAD COMMENTS
function loadComments(){
  onSnapshot(collection(db,"comments"),snapshot=>{
    let box=document.getElementById('comments');
    box.innerHTML='';

    snapshot.forEach(doc=>{
      let c=doc.data();

      let div=document.createElement('div');
      div.className='card';

      div.innerHTML=`
        <strong>${c.name}</strong><br>
        ${'⭐'.repeat(c.stars)}<br>
        ${c.text}
      `;

      box.appendChild(div);
    });
  });
}

// INIT
loadUsers();
loadAppointments();
loadComments();
</script>

</head>

<body>

<header>
  <h1>💪 Trainer Dashboard</h1>
</header>

<div class="container">

<!-- USERS -->
<div class="section">
<h2>👥 Clients</h2>
<div id="users"></div>
</div>

<!-- CHAT -->
<div class="section">
<h2>💬 Chat</h2>
<div id="chatBox" class="chat"></div>
<input id="reply" placeholder="Reply...">
<button onclick="sendReply()">Send</button>
</div>

<!-- BOOKINGS -->
<div class="section">
<h2>📅 Appointments</h2>
<div id="appointments"></div>
</div>

<!-- REVIEWS -->
<div class="section">
<h2>⭐ Reviews</h2>
<div id="comments"></div>
</div>

</div>

</body>
</html>
