<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  background: #111827;
}

.container {
  display: flex;
  height: 90vh;
}

.users {
  width: 30%;
  background: #111827;
  padding: 10px;
  overflow-y: auto;
}

.user {
  padding: 10px;
  background: #1f2937;
  margin: 5px 0;
  border-radius: 10px;
  cursor: pointer;
}

.user:hover {
  background: #374151;
}

.chat-area {
  width: 70%;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 10px;
}

.msg {
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
}

.me {
  background: #22c55e;
  color: black;
  text-align: right;
}

.them {
  background: #1f2937;
}

input, button {
  padding: 10px;
  border: none;
  border-radius: 10px;
}

input {
  flex: 1;
  background: #1f2937;
  color: white;
}

.send-row {
  display: flex;
  gap: 10px;
}

button {
  background: #22c55e;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <h2>Trainer Dashboard 💪</h2>
</div>

<div class="container">

<!-- CLIENT LIST -->
<div class="users" id="users"></div>

<!-- CHAT -->
<div class="chat-area">
  <div class="chat-box" id="chatBox"></div>

  <div class="send-row">
    <input id="reply" placeholder="Reply to client...">
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
let currentUser = null;

// LOAD CLIENTS
function loadUsers(){
  const usersDiv = document.getElementById('users');
  usersDiv.innerHTML = '';

  for(let key in localStorage){
    if(key.startsWith('chat_')){
      const name = key.replace('chat_','');

      const div = document.createElement('div');
      div.className = 'user';
      div.innerText = name;

      div.onclick = () => {
        currentUser = name;
        loadChat();
      };

      usersDiv.appendChild(div);
    }
  }
}

// LOAD CHAT
function loadChat(){
  const box = document.getElementById('chatBox');
  box.innerHTML = '';

  let chat = JSON.parse(localStorage.getItem('chat_' + currentUser) || '[]');

  chat.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.from === 'trainer' ? 'me' : 'them');
    div.innerText = m.text;
    box.appendChild(div);
  });
}

// SEND MESSAGE
function send(){
  const input = document.getElementById('reply');

  if(!input.value || !currentUser){
    alert("Select a client first");
    return;
  }

  let chat = JSON.parse(localStorage.getItem('chat_' + currentUser) || '[]');

  chat.push({
    from: 'trainer',
    text: input.value
  });

  localStorage.setItem('chat_' + currentUser, JSON.stringify(chat));

  input.value = '';
  loadChat();
}

// INIT
loadUsers();
</script>

</body>
</html>
