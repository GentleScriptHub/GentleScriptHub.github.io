<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train With Me</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(to right, #1e1e1e, #2c2c2c);
  color: white;
}

header {
  text-align: center;
  padding: 30px 15px;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.card {
  background: #fff;
  color: #000;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, button, textarea {
  padding: 12px;
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
}

button {
  background: black;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #444;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

.stars span {
  font-size: 1.5rem;
  cursor: pointer;
}

.comment-box {
  margin-top: 10px;
}

.comment {
  background: #eee;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

footer {
  text-align: center;
  padding: 15px;
  font-size: 0.9rem;
}

@media (min-width: 600px) {
  .grid { grid-template-columns: 1fr 1fr; }
}

</style>
</head>
<body>

<header>
  <h1>💪 Train With Me</h1>
  <p>Get stronger. Get confident. Start today.</p>
</header>

<div class="container">
  <div class="grid">

    <div class="card">
      <h2>About Me</h2>
      <p>I help people build strength, lose fat, and feel confident.</p>
    </div>

    <div class="card">
      <h2>Book a Session</h2>
      <form action="https://formsubmit.co/javonjoseph2004@gmail.com" method="POST" target="_blank">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="date" name="date" required>
        <input type="time" name="time" required>

        <input type="hidden" name="_subject" value="New Booking Request!">
        <input type="hidden" name="_captcha" value="false">

        <button type="submit">Book Now</button>
      </form>
    </div>

    <div class="card">
      <h2>My Training</h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" />
        <img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1" />
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438" />
      </div>
    </div>

    <div class="card">
      <h2>Reviews ⭐</h2>

      <div class="stars" id="stars">
        <span onclick="rate(1)">⭐</span>
        <span onclick="rate(2)">⭐</span>
        <span onclick="rate(3)">⭐</span>
        <span onclick="rate(4)">⭐</span>
        <span onclick="rate(5)">⭐</span>
      </div>

      <textarea id="commentInput" placeholder="Leave a comment..."></textarea>
      <button onclick="addComment()">Post</button>

      <div id="comments"></div>
    </div>

  </div>
</div>

<footer>
  © 2026 Train With Me
</footer>

<script>
let rating = 0;

function rate(num) {
  rating = num;
  alert("You rated " + num + " stars");
}

function addComment() {
  const input = document.getElementById("commentInput");
  const comments = document.getElementById("comments");

  if(input.value === "") return;

  const div = document.createElement("div");
  div.className = "comment";
  div.innerText = "⭐".repeat(rating) + " - " + input.value;

  comments.prepend(div);
  input.value = "";
}
</script>

</body>
</html>
