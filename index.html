<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train With Me</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#0f172a;color:white;margin:0}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#111827;padding:25px;border-radius:15px;width:90%;max-width:400px;text-align:center}
input,textarea,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
input,textarea{background:#1f2937;color:white}
button{background:#22c55e;color:black;font-weight:bold}
.section{background:#111827;padding:15px;margin:15px;border-radius:15px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
.gallery img{width:100%;border-radius:10px;height:100px;object-fit:cover}
.chat{max-height:200px;overflow:auto}
.msg{padding:8px;margin:5px;border-radius:10px}
.me{background:#22c55e;color:black;text-align:right}
.them{background:#1f2937}
.comment{background:#1f2937;padding:10px;margin-top:10px;border-radius:10px}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiCVRf6_qtx8VAPPeXg_9n3alQ-nUv14I",
  authDomain: "nightbuild.firebaseapp.com",
  projectId: "nightbuild",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user=null;
let rating=0;

// LOGIN
window.start=function(){
user=document.getElementById('name').value;
if(!user) return alert("Enter name");

document.getElementById('login').style.display='none';
document.getElementById('app').style.display='block';

document.getElementById('bookName').value=user;

listenChat();
listenComments();
}

// CHAT
window.send=async function(){
let text=document.getElementById('msg').value;
if(!text) return;

await addDoc(collection(db,"messages"),{
name:user,
text:text,
time:Date.now()
});

document.getElementById('msg').value='';
}

function listenChat(){
const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snapshot=>{
let box=document.getElementById('chat');
box.innerHTML='';

snapshot.forEach(doc=>{
let m=doc.data();
let div=document.createElement('div');
div.className='msg '+(m.name===user?'me':'them');
div.innerText=m.name+": "+m.text;
box.appendChild(div);
});
});
}

// BOOKINGS
window.book=async function(e){
e.preventDefault();

await addDoc(collection(db,"appointments"),{
name:user,
email:document.getElementById('email').value,
date:document.getElementById('date').value,
time:document.getElementById('time').value
});

alert("Booking sent!");
}

// COMMENTS
window.rate=function(n){rating=n}

window.addComment=async function(){
let text=document.getElementById('commentInput').value;
if(!text) return;

await addDoc(collection(db,"comments"),{
name:user,
text:text,
stars:rating,
time:Date.now()
});

document.getElementById('commentInput').value='';
}

function listenComments(){
const q=query(collection(db,"comments"),orderBy("time"));

onSnapshot(q,snapshot=>{
let box=document.getElementById('comments');
box.innerHTML='';

snapshot.forEach(doc=>{
let c=doc.data();
let div=document.createElement('div');
div.className='comment';
div.innerHTML=`<strong>${c.name}</strong><br>${'⭐'.repeat(c.stars)}<br>${c.text}`;
box.appendChild(div);
});
});
}
</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="card">
    <h2>💪 Train With Me</h2>
    <input id="name" placeholder="Enter your name">
    <button onclick="start()">Enter</button>
  </div>
</div>

<!-- MAIN -->
<div id="app" style="display:none">

<div class="section">
<h2>📅 Book Session</h2>
<form onsubmit="book(event)">
<input id="bookName" required>
<input id="email" placeholder="Email" required>
<input type="date" id="date" required>
<input type="time" id="time" required>
<button>Book Now</button>
</form>
</div>

<div class="section">
<h2>🏋️ Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
<img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1">
<img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
</div>
</div>

<div class="section">
<h2>💬 Chat</h2>
<div id="chat" class="chat"></div>
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

<div class="section">
<h2>⭐ Reviews</h2>

<div>
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>

<textarea id="commentInput" placeholder="Write review..."></textarea>
<button onclick="addComment()">Post</button>

<div id="comments"></div>

</div>

</div>

</body>
</html>
