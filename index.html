<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train With Me</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:#e5e7eb;
}
.center{display:flex;justify-content:center;align-items:center;height:100vh;padding:20px}
.card{
  background:#111827;
  padding:25px;
  border-radius:20px;
  width:100%;
  max-width:420px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
h2{margin-bottom:10px}
input,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:0.95rem;
}
input,textarea{background:#1f2937;color:white}
button{
  background:#22c55e;
  color:#000;
  font-weight:600;
  cursor:pointer;
}
button:hover{background:#16a34a}

header{
  text-align:center;
  padding:25px 15px;
  border-bottom:1px solid #1f2937;
}
header h1{font-size:2rem}
header p{color:#9ca3af;margin-top:5px}

.container{max-width:1100px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:1fr;gap:20px}

.section-card{
  background:#111827;
  padding:20px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.gallery img{width:100%;border-radius:12px;height:120px;object-fit:cover}

.stars span{font-size:1.5rem;cursor:pointer}
.comment{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:0.9rem;
}
.comment strong{color:#22c55e}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}
.logout-btn{
  background:#ef4444;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  border:none;
}
.logout-btn:hover{background:#dc2626}

@media(min-width:700px){
  .grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="center">
  <div class="card">
    <h2>Welcome 👋</h2>
    <p style="color:#9ca3af">Enter your name to continue</p>
    <input id="username" placeholder="Your name">
    <button onclick="login()">Continue</button>
  </div>
</div>

<!-- MAIN SITE -->
<div id="mainSite" style="display:none;">

<header>
  <h1>💪 Train With Me</h1>
  <div class="top-bar">
    <p id="welcome"></p>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</header>

<div class="container">
  <div class="grid">

    <div class="section-card">
      <h2>Book a Session</h2>
      <form action="https://formsubmit.co/javonjoseph2004@gmail.com" method="POST" target="_blank">
        <input type="text" id="bookName" name="name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="date" name="date" required>
        <input type="time" name="time" required>
        <input type="hidden" name="_subject" value="New Booking Request!">
        <input type="hidden" name="_captcha" value="false">
        <button type="submit">Book Now</button>
      </form>
    </div>

    <div class="section-card">
      <h2>Training Gallery</h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
        <img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1">
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
      </div>
    </div>

    <div class="section-card">
      <h2>Client Reviews ⭐</h2>
      <div class="stars">
        <span onclick="rate(1)">⭐</span>
        <span onclick="rate(2)">⭐</span>
        <span onclick="rate(3)">⭐</span>
        <span onclick="rate(4)">⭐</span>
        <span onclick="rate(5)">⭐</span>
      </div>
      <textarea id="commentInput" placeholder="Write your review..."></textarea>
      <button onclick="addComment()">Post Review</button>
      <div id="comments"></div>
    </div>

  </div>
</div>

</div>

<script>
let rating = 0;

function login(){
  const name=document.getElementById('username').value;
  if(!name) return alert('Enter your name');
  localStorage.setItem('user',name);
  showMain();
}

function logout(){
  localStorage.removeItem('user');
  location.reload();
}

function showMain(){
  const user=localStorage.getItem('user');
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainSite').style.display='block';
  document.getElementById('welcome').innerText='Hi, '+user;
  document.getElementById('bookName').value=user;
  displayComments();
}

window.onload=function(){
  if(localStorage.getItem('user')) showMain();
}

function rate(num){rating=num}

function addComment(){
  const input=document.getElementById('commentInput');
  const user=localStorage.getItem('user')||'Anonymous';
  if(input.value==='') return;

  const comment={name:user,text:input.value,stars:rating};
  let comments=JSON.parse(localStorage.getItem('comments')||'[]');
  comments.unshift(comment);
  localStorage.setItem('comments',JSON.stringify(comments));

  input.value='';
  displayComments();
}

function displayComments(){
  const container=document.getElementById('comments');
  container.innerHTML='';
  let comments=JSON.parse(localStorage.getItem('comments')||'[]');

  comments.forEach(c=>{
    const div=document.createElement('div');
    div.className='comment';
    div.innerHTML=`<strong>${c.name}</strong><br>${'⭐'.repeat(c.stars)}<br>${c.text}`;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
