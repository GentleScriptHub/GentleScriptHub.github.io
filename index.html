<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train With Me</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#0f172a;color:#e5e7eb}

/* LOGIN */
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#111827;padding:30px;border-radius:20px;width:90%;max-width:400px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.4)}
.card h2{margin-bottom:10px}
input,textarea,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
input,textarea{background:#1f2937;color:white}
button{background:#22c55e;color:black;font-weight:600;cursor:pointer}
button:hover{background:#16a34a}

/* HEADER */
header{padding:20px;text-align:center;border-bottom:1px solid #1f2937}
header h1{font-size:2rem}

/* LAYOUT */
.container{max-width:1100px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:1fr;gap:20px}

.section{background:#111827;padding:20px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,0.3)}
.section h2{margin-bottom:10px}

/* GALLERY */
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
.gallery img{width:100%;height:120px;object-fit:cover;border-radius:10px}

/* CHAT */
.chat{max-height:250px;overflow-y:auto;padding:10px;background:#0b1220;border-radius:10px}
.msg{padding:8px;margin:5px;border-radius:10px;font-size:0.9rem}
.me{background:#22c55e;color:black;text-align:right}
.them{background:#1f2937}

/* COMMENTS */
.comment{background:#1f2937;padding:10px;margin-top:10px;border-radius:10px}
.comment strong{color:#22c55e}

/* RESPONSIVE */
@media(min-width:768px){
  .grid{grid-template-columns:1fr 1fr}
}

@media(min-width:1024px){
  .grid{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="card">
    <h2>💪 Train With Me</h2>
    <p style="color:#9ca3af">Sign in to continue</p>
    <input id="name" placeholder="Your name">
    <button onclick="start()">Enter</button>
  </div>
</div>

<!-- MAIN -->
<div id="app" style="display:none">

<header>
  <h1>Train With Me</h1>
</header>

<div class="container">
  <div class="grid">

    <!-- BOOKING -->
    <div class="section">
      <h2>📅 Book Session</h2>
      <form action="https://formsubmit.co/javonjoseph2004@gmail.com" method="POST" target="_blank">
        <input id="bookName" name="name" required>
        <input name="email" placeholder="Email" required>
        <input type="date" name="date" required>
        <input type="time" name="time" required>
        <button type="submit">Book Now</button>
      </form>
    </div>

    <!-- GALLERY -->
    <div class="section">
      <h2>🏋️ Gallery</h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
        <img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1">
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
      </div>
    </div>

    <!-- CHAT -->
    <div class="section">
      <h2>💬 Chat</h2>
      <div id="chat" class="chat"></div>
      <input id="msg" placeholder="Type message...">
      <button onclick="send()">Send</button>
    </div>

    <!-- REVIEWS -->
    <div class="section">
      <h2>⭐ Reviews</h2>
      <div>
        <span onclick="rate(1)">⭐</span>
        <span onclick="rate(2)">⭐</span>
        <span onclick="rate(3)">⭐</span>
        <span onclick="rate(4)">⭐</span>
        <span onclick="rate(5)">⭐</span>
      </div>
      <textarea id="commentInput" placeholder="Write your review..."></textarea>
      <button onclick="addComment()">Post</button>
      <div id="comments"></div>
    </div>

  </div>
</div>

</div>

<script>
let user;
let rating=0;

function start(){
user=document.getElementById('name').value;
if(!user) return alert('Enter name');
localStorage.setItem('user',user);
document.getElementById('login').style.display='none';
document.getElementById('app').style.display='block';
document.getElementById('bookName').value=user;
loadChat();
loadComments();
}

function key(){return 'chat_'+user}

function send(){
let input=document.getElementById('msg');
if(!input.value) return;
let chat=JSON.parse(localStorage.getItem(key())||'[]');
chat.push({from:'client',text:input.value});
localStorage.setItem(key(),JSON.stringify(chat));
input.value='';
loadChat();
}

function loadChat(){
let box=document.getElementById('chat');
box.innerHTML='';
let chat=JSON.parse(localStorage.getItem(key())||'[]');
chat.forEach(m=>{
let div=document.createElement('div');
div.className='msg '+(m.from==='client'?'me':'them');
div.innerText=m.text;
box.appendChild(div);
});
}

function rate(n){rating=n}

function addComment(){
let input=document.getElementById('commentInput');
if(!input.value) return;
let comments=JSON.parse(localStorage.getItem('comments')||'[]');
comments.unshift({name:user,text:input.value,stars:rating});
localStorage.setItem('comments',JSON.stringify(comments));
input.value='';
loadComments();
}

function loadComments(){
let box=document.getElementById('comments');
box.innerHTML='';
let comments=JSON.parse(localStorage.getItem('comments')||'[]');
comments.forEach(c=>{
let div=document.createElement('div');
div.className='comment';
div.innerHTML=`<strong>${c.name}</strong><br>${'⭐'.repeat(c.stars)}<br>${c.text}`;
box.appendChild(div);
});
}

if(localStorage.getItem('user')){
user=localStorage.getItem('user');
start();
}
</script>

</body>
</html>
