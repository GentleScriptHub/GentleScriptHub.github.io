<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train With Me</title>

<style>
body {font-family: Arial;margin:0;background:#0f172a;color:white}
.center {display:flex;justify-content:center;align-items:center;height:100vh}
.card {background:#111827;padding:25px;border-radius:15px;width:90%;max-width:400px}
input,textarea,button {width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px}
input,textarea {background:#1f2937;color:white}
button {background:#22c55e;color:black;font-weight:bold}
.section {background:#111827;padding:15px;margin:15px;border-radius:15px}
.gallery {display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
.gallery img {width:100%;border-radius:10px;height:100px;object-fit:cover}
.chat {max-height:200px;overflow:auto}
.msg {padding:8px;margin:5px;border-radius:10px}
.me {background:#22c55e;color:black;text-align:right}
.them {background:#1f2937}
.comment {background:#1f2937;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="card">
    <h2>Train With Me 💪</h2>
    <p>Enter your name</p>
    <input id="name">
    <button onclick="start()">Continue</button>
  </div>
</div>

<!-- MAIN -->
<div id="app" style="display:none">

<div class="section">
<h2>Book Session</h2>
<form action="https://formsubmit.co/javonjoseph2004@gmail.com" method="POST" target="_blank">
<input id="bookName" name="name" required>
<input name="email" placeholder="Email" required>
<input type="date" name="date" required>
<input type="time" name="time" required>
<button>Book</button>
</form>
</div>

<div class="section">
<h2>Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
<img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1">
<img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
</div>
</div>

<div class="section">
<h2>Chat Trainer 💬</h2>
<div id="chat" class="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

<div class="section">
<h2>Reviews ⭐</h2>

<div>
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>

<textarea id="commentInput" placeholder="Write review..."></textarea>
<button onclick="addComment()">Post</button>

<div id="comments"></div>

</div>

</div>

<script>
let user;
let rating = 0;

// LOGIN
function start(){
user=document.getElementById('name').value;
if(!user) return alert("Enter name");

localStorage.setItem('user',user);

document.getElementById('login').style.display='none';
document.getElementById('app').style.display='block';

document.getElementById('bookName').value=user;

loadChat();
loadComments();
}

// CHAT
function key(){return 'chat_'+user}

function send(){
let input=document.getElementById('msg');
if(!input.value) return;

let chat=JSON.parse(localStorage.getItem(key())||'[]');
chat.push({from:'client',text:input.value});
localStorage.setItem(key(),JSON.stringify(chat));

input.value='';
loadChat();
}

function loadChat(){
let box=document.getElementById('chat');
box.innerHTML='';
let chat=JSON.parse(localStorage.getItem(key())||'[]');

chat.forEach(m=>{
let div=document.createElement('div');
div.className='msg '+(m.from==='client'?'me':'them');
div.innerText=m.text;
box.appendChild(div);
});
}

// COMMENTS
function rate(num){rating=num}

function addComment(){
let input=document.getElementById('commentInput');
if(!input.value) return;

let comments=JSON.parse(localStorage.getItem('comments')||'[]');

comments.unshift({
name:user,
text:input.value,
stars:rating
});

localStorage.setItem('comments',JSON.stringify(comments));

input.value='';
loadComments();
}

function loadComments(){
let box=document.getElementById('comments');
box.innerHTML='';

let comments=JSON.parse(localStorage.getItem('comments')||'[]');

comments.forEach(c=>{
let div=document.createElement('div');
div.className='comment';
div.innerHTML=`<strong>${c.name}</strong><br>${'⭐'.repeat(c.stars)}<br>${c.text}`;
box.appendChild(div);
});
}

// AUTO LOGIN
if(localStorage.getItem('user')){
user=localStorage.getItem('user');
start();
}
</script>

</body>
</html>
